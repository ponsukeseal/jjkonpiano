<!DOCTYPE html>
<html>
<head>
<title>Jujutsu Kaisen Piano Playlist</title>

<style>

body{
  margin:0;
  background:#121212;
  color:white;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#181818;
  padding:30px;
  border-radius:12px;
  width:420px;
  box-shadow:0 0 25px rgba(0,0,0,0.7);
  text-align:center;
}

h1{
  margin-top:0;
  font-size:28px;
}

#playlist{
  margin-top:20px;
  max-height:250px;
  overflow-y:auto;
  border-radius:8px;
}

.song{
  padding:12px;
  border-bottom:1px solid #333;
  cursor:pointer;
  transition:0.2s;
}

.song:hover{
  background:#1db954;
}

.active{
  background:#1db954;
}

audio{
  margin-top:20px;
  width:100%;
  filter:invert(1);
}

.controls{
  margin-top:10px;
}

button{
  background:#1db954;
  border:none;
  color:white;
  padding:10px 18px;
  margin:5px;
  cursor:pointer;
  border-radius:6px;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

</style>

</head>
<body>

<div class="container">

<h1>🎵 JJK Piano Playlist</h1>

<div id="playlist"></div>

<audio id="player" controls></audio>

<div class="controls">
<button onclick="prevSong()">⏮ Prev</button>
<button onclick="nextSong()">Next ⏭</button>
</div>

</div>

<script>

const songs = [
"lostinparadise.mp3",
"kaikaikitan.mp3",
"morethanwords.mp3",
"specialz.mp3",
"aonosumika.mp3",
"akari.mp3",
"aizo.mp3",
"yoakenouta.mp3"
];

let current = 0;
const player = document.getElementById("player");
const playlist = document.getElementById("playlist");

function loadSongs(){
songs.forEach((song,i)=>{
  const div = document.createElement("div");
  div.className="song";
  div.innerText=song.replace(".mp3","");
  div.onclick=()=>playSong(i);
  playlist.appendChild(div);
});
}

function playSong(index){
current=index;
player.src=songs[current];
player.play();
updateActive();
}

function nextSong(){
current=(current+1)%songs.length;
playSong(current);
}

function prevSong(){
current=(current-1+songs.length)%songs.length;
playSong(current);
}

function updateActive(){
document.querySelectorAll(".song").forEach((el,i)=>{
el.classList.toggle("active",i===current);
});
}

player.addEventListener("ended",nextSong);

loadSongs();
playSong(0);

</script>

</body>
</html>
